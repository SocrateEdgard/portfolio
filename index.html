<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socrate MK - Nouveau site</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #1a1a2e;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .hero-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 4rem;
            flex-wrap: wrap;
        }

        .hero-text {
            flex: 1;
            min-width: 300px;
        }

        .hero-image {
            flex: 1;
            min-width: 300px;
            text-align: center;
        }

        .image-wrapper {
            position: relative;
            display: inline-block;
        }

        .image-wrapper img {
            width: 100%;
            max-width: 450px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            object-fit: cover;
        }

        .image-badge {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: #0984e3;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .subtitle {
            color: #0984e3;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 1rem;
        }

        .title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .tagline {
            font-size: 1.2rem;
            color: #b8b8b8;
            margin-bottom: 1.5rem;
        }

        .tagline span {
            color: #0984e3;
        }

        .description {
            color: #b8b8b8;
            line-height: 1.8;
            margin-bottom: 2rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            background: #0984e3;
            color: white;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: #0773c5;
            transform: translateY(-3px);
        }

        @media (max-width: 768px) {
            .hero-content {
                flex-direction: column;
                text-align: center;
            }

            .title {
                font-size: 1.8rem;
            }

            .image-wrapper img {
                max-width: 280px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="hero-content">
            <div class="hero-text">
                <h6 class="subtitle">Nouvelle plateforme</h6>
                <h1 class="title">Socrate Mwamba Kasongo</h1>
                <h2 class="tagline">Découvrez mon nouveau site <span>dynamique</span></h2>
                <p class="description">
                    Mon portfolio évolue vers une version plus performante.<br>
                    Cliquez ci-dessous pour accéder à la nouvelle plateforme.
                </p>
                <a href="https://socratedev.wuaze.com" class="btn">
                    <i class="fas fa-arrow-right"></i> Accéder au nouveau site
                </a>
            </div>
            <div class="hero-image">
                <div class="image-wrapper">
                    <img src="photos/maphoto.jpg" alt="Socrate Mwamba Kasongo">
                    <div class="image-badge">
                        <span>Nouvelle version</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
